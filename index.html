<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>감성 커스텀 시계</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&family=Nanum+Gothic:wght@400;700&family=Noto+Serif+KR:wght@300;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --modal-bg: rgba(20, 20, 20, 0.92);
            --modal-border: rgba(255,255,255,0.15);
            --section-border: rgba(255,255,255,0.1);
            --label-color: #bbb;
            --heading-color: #ddd;
            --input-bg: rgba(255,255,255,0.1);
            --input-border: rgba(255,255,255,0.2);
            --input-color: #fff;
            --switch-off: #444;
            --btn-bg: rgba(255,255,255,0.2);
            --btn-border: rgba(255,255,255,0.3);
            --scrollbar-thumb: rgba(255,255,255,0.2);
        }

        body.light-mode {
            --modal-bg: rgba(240, 240, 240, 0.95);
            --modal-border: rgba(0,0,0,0.15);
            --section-border: rgba(0,0,0,0.1);
            --label-color: #444;
            --heading-color: #222;
            --input-bg: rgba(0,0,0,0.07);
            --input-border: rgba(0,0,0,0.2);
            --input-color: #111;
            --switch-off: #bbb;
            --btn-bg: rgba(0,0,0,0.15);
            --btn-border: rgba(0,0,0,0.2);
            --scrollbar-thumb: rgba(0,0,0,0.2);
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            color: #fff;
            user-select: none;
        }

        .video-background {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .greenscreen-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #00ff00;
            z-index: -1;
            display: none;
        }

        .clock-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            text-shadow: 0 4px 20px rgba(0,0,0,0.7);
            cursor: pointer;
        }

        .time-box { display: flex; align-items: baseline; }

        #ampm {
            font-size: 2.5rem;
            margin-right: 15px;
            font-weight: 400;
            display: none;
        }

        #time {
            font-size: 8rem;
            font-weight: 200;
            letter-spacing: -2px;
            line-height: 1;
        }

        #date {
            font-size: 1.5rem;
            font-weight: 400;
            margin-top: 15px;
            letter-spacing: 4px;
            opacity: 0.8;
        }

        #weather {
            font-size: 1.2rem;
            font-weight: 400;
            margin-top: 15px;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .settings-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--btn-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--btn-border);
            color: white;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        body.light-mode .settings-btn { color: #222; }

        .settings-btn.show { opacity: 1; visibility: visible; }

        .settings-modal {
            position: fixed;
            bottom: 90px;
            right: 30px;
            background: var(--modal-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--modal-border);
            padding: 20px;
            border-radius: 15px;
            width: 340px;
            max-height: 70vh;
            overflow-y: auto;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            scrollbar-width: thin;
            scrollbar-color: var(--scrollbar-thumb) transparent;
        }

        .settings-modal::-webkit-scrollbar { width: 4px; }
        .settings-modal::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }

        .settings-modal.show { opacity: 1; visibility: visible; transform: translateY(0); }

        .setting-section {
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--section-border);
        }

        .setting-section h4 {
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: var(--heading-color);
            font-weight: 400;
        }

        .flex-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 6px;
        }

        label { font-size: 0.85rem; color: var(--label-color); }

        input[type="text"], select {
            padding: 8px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 6px;
            color: var(--input-color);
            font-family: inherit;
            outline: none;
            font-size: 0.85rem;
        }

        select option { background: #222; color: #fff; }
        body.light-mode select option { background: #eee; color: #111; }

        input[type="file"] { display: none; }

        .file-label {
            display: block;
            text-align: center;
            background: var(--input-bg);
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            border: 1px dashed var(--input-border);
            color: var(--label-color);
        }

        .file-label:hover { background: rgba(128,128,128,0.25); }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
            flex-shrink: 0;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--switch-off);
            transition: .3s;
            border-radius: 22px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #fff; }
        input:checked + .slider:before { transform: translateX(18px); background-color: #000; }

        .api-link {
            display: block;
            text-align: center;
            font-size: 0.75rem;
            color: #88aaff;
            text-decoration: none;
            margin-top: 6px;
            opacity: 0.85;
        }

        .api-link:hover { opacity: 1; text-decoration: underline; }

        #video-filename {
            font-size: 0.75rem;
            color: var(--label-color);
            margin-top: 4px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
    <div class="video-background">
        <video id="bg-video" autoplay loop muted playsinline>
            <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm" type="video/webm">
            <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4" type="video/mp4">
            당신의 브라우저는 동영상을 지원하지 않습니다.
        </video>
    </div>

    <div class="greenscreen-bg" id="greenscreen"></div>

    <div class="clock-container" id="main-screen">
        <div class="time-box">
            <span id="ampm">AM</span>
            <span id="time">00:00:00</span>
        </div>
        <div id="date">LOADING...</div>
        <div id="weather">날씨 기능을 켜거나 지역을 설정하세요</div>
    </div>

    <button class="settings-btn" id="menu-btn" aria-label="설정 열기">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
    </button>

    <div class="settings-modal" id="settings-panel">

        <div class="setting-section">
            <h4>배경 설정</h4>
            <label class="file-label" for="video-file">동영상 선택 (대용량 가능)</label>
            <input type="file" id="video-file" accept="video/*">
            <div id="video-filename"></div>
            <div class="flex-row" style="margin-top:10px;">
                <label>크로마키 그린스크린</label>
                <label class="switch"><input type="checkbox" id="toggle-greenscreen"><span class="slider"></span></label>
            </div>
        </div>

        <div class="setting-section">
            <h4>시계 설정</h4>
            <div class="flex-row">
                <label>오전/오후 표시 (AM/PM)</label>
                <label class="switch"><input type="checkbox" id="toggle-ampm"><span class="slider"></span></label>
            </div>
            <div class="flex-row" style="margin-top:6px;">
                <label>표시 단위:</label>
                <div style="display:flex;gap:8px;">
                    <label><input type="checkbox" id="show-hour" checked> 시</label>
                    <label><input type="checkbox" id="show-min" checked> 분</label>
                    <label><input type="checkbox" id="show-sec" checked> 초</label>
                </div>
            </div>
        </div>

        <div class="setting-section">
            <h4>날짜 설정</h4>
            <div class="flex-row">
                <label>날짜 표시</label>
                <label class="switch"><input type="checkbox" id="toggle-date" checked><span class="slider"></span></label>
            </div>
            <div class="flex-row" style="margin-top:6px;">
                <label><input type="checkbox" id="show-year" checked> 년</label>
                <label><input type="checkbox" id="show-month" checked> 월</label>
                <label><input type="checkbox" id="show-day" checked> 일</label>
            </div>
        </div>

        <div class="setting-section">
            <h4>날씨 설정</h4>
            <div class="flex-row">
                <label>날씨 표시</label>
                <label class="switch"><input type="checkbox" id="toggle-weather"><span class="slider"></span></label>
            </div>

            <button id="geo-btn" style="width:100%;margin-top:8px;padding:8px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:6px;color:var(--input-color);font-family:inherit;font-size:0.85rem;cursor:pointer;">📍 현재 위치 자동 탐색</button>
            <div id="geo-status" style="font-size:0.75rem;color:var(--label-color);margin-top:4px;text-align:center;min-height:1em;"></div>

            <div class="flex-row" style="margin-top:8px;">
                <label style="flex-shrink:0;">도 (시/도)</label>
                <select id="weather-province" style="width:60%;"></select>
            </div>
            <div class="flex-row" style="margin-top:6px;">
                <label style="flex-shrink:0;">시/군/구</label>
                <select id="weather-city" style="width:60%;"></select>
            </div>
            <div class="flex-row" style="margin-top:6px;">
                <label style="flex-shrink:0;">읍/면/동</label>
                <select id="weather-district" style="width:60%;"></select>
            </div>

            <div class="flex-row" style="margin-top:8px;">
                <label>온도 단위</label>
                <select id="weather-unit" style="width:60%;padding:4px;">
                    <option value="metric">섭씨 (°C)</option>
                    <option value="imperial">화씨 (°F)</option>
                </select>
            </div>
            <div class="flex-row" style="margin-top:6px;">
                <label>API Key</label>
                <input type="text" id="weather-key" placeholder="OpenWeather API Key" style="width:60%;padding:4px 8px;">
            </div>
            <a class="api-link" href="https://openweathermap.org/api" target="_blank" rel="noopener">🔑 OpenWeather API Key 발급받기 →</a>
        </div>

        <div class="setting-section">
            <h4>스타일 설정</h4>
            <div class="flex-row">
                <label>다크 / 라이트 모드</label>
                <label class="switch"><input type="checkbox" id="toggle-lightmode"><span class="slider"></span></label>
            </div>
            <div class="flex-row" style="margin-top:8px;">
                <label>폰트</label>
                <select id="font-select" style="width:60%;">
                    <option value="'Montserrat', sans-serif">Montserrat (감성영문)</option>
                    <option value="'Orbitron', sans-serif">Orbitron (디지털)</option>
                    <option value="'Noto Serif KR', serif">Noto Serif (명조체)</option>
                    <option value="'Nanum Gothic', sans-serif">나눔고딕 (깔끔)</option>
                </select>
            </div>
            <div class="flex-row" style="margin-top:8px;">
                <label>글자 색상</label>
                <input type="color" id="color-picker" value="#ffffff" style="border:none;background:none;cursor:pointer;width:40px;height:25px;">
            </div>
        </div>

    </div>

        const provinceSelect = document.getElementById('weather-province');
        const citySelect = document.getElementById('weather-city');
        const districtSelect = document.getElementById('weather-district');

        function buildProvinceSelect() {
            provinceSelect.innerHTML = '';
            Object.keys(REGIONS).forEach(prov => {
                const opt = document.createElement('option');
                opt.value = prov;
                opt.textContent = prov;
                provinceSelect.appendChild(opt);
            });
            buildCitySelect();
        }

        function buildCitySelect() {
            const prov = provinceSelect.value;
            citySelect.innerHTML = '';
            const cities = Object.keys(REGIONS[prov] || {});
            cities.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                citySelect.appendChild(opt);
            });
            buildDistrictSelect();
        }

        function buildDistrictSelect() {
            const prov = provinceSelect.value;
            const city = citySelect.value;
            districtSelect.innerHTML = '';
            const districts = (REGIONS[prov] && REGIONS[prov][city]) || [];
            if (districts.length === 0) {
                const opt = document.createElement('option');
                opt.value = '';
                opt.textContent = '(해당없음)';
                districtSelect.appendChild(opt);
            } else {
                districts.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d;
                    opt.textContent = d;
                    districtSelect.appendChild(opt);
                });
            }
        }

        provinceSelect.addEventListener('change', buildCitySelect);
        citySelect.addEventListener('change', buildDistrictSelect);
        buildProvinceSelect();

        let fadeTimer;

        function resetFadeTimer() {
            if (document.getElementById('settings-panel').classList.contains('show')) {
                clearTimeout(fadeTimer);
                return;
            }
            clearTimeout(fadeTimer);
            fadeTimer = setTimeout(() => {
                document.getElementById('menu-btn').classList.remove('show');
            }, 5000);
        }

        function updateClock() {
            const now = new Date();
            const hCheck = document.getElementById('show-hour').checked;
            const mCheck = document.getElementById('show-min').checked;
            const sCheck = document.getElementById('show-sec').checked;
            const ampmCheck = document.getElementById('toggle-ampm').checked;

            let rawHours = now.getHours();

            if (ampmCheck) {
                document.getElementById('ampm').style.display = 'inline';
                document.getElementById('ampm').innerText = rawHours >= 12 ? 'PM' : 'AM';
                rawHours = rawHours % 12 || 12;
            } else {
                document.getElementById('ampm').style.display = 'none';
            }

            const hours = String(rawHours).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            const parts = [];
            if (hCheck) parts.push(hours);
            if (mCheck) parts.push(minutes);
            if (sCheck) parts.push(seconds);
            document.getElementById('time').innerText = parts.join(':') || '00';

            const dateVisible = document.getElementById('toggle-date').checked;
            const dateBox = document.getElementById('date');

            if (dateVisible) {
                dateBox.style.display = 'block';
                const yCheck = document.getElementById('show-year').checked;
                const moCheck = document.getElementById('show-month').checked;
                const dCheck = document.getElementById('show-day').checked;
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
                const dayStr = days[now.getDay()];
                const dateParts = [];
                if (yCheck) dateParts.push(year);
                if (moCheck) dateParts.push(month);
                if (dCheck) dateParts.push(day);
                let result = dateParts.join(' . ');
                if (result) result += ` . ${dayStr}`;
                dateBox.innerText = result || dayStr;
            } else {
                dateBox.style.display = 'none';
            }
        }

        setInterval(updateClock, 1000);
        updateClock();

        const bgVideo = document.getElementById('bg-video');
        bgVideo.muted = true;
        bgVideo.loop = true;
        bgVideo.playsInline = true;
        bgVideo.addEventListener('error', () => {
            console.warn('Background video error', bgVideo.error);
        });
        bgVideo.play().catch(() => {
            // Autoplay may be blocked; user can still click to play.
        });

        function mapWeatherCode(code) {
            const WEATHER_CODES = {
                0: 'Clear',
                1: 'Mainly clear',
                2: 'Partly cloudy',
                3: 'Overcast',
                45: 'Fog',
                48: 'Depositing rime fog',
                51: 'Light drizzle',
                53: 'Moderate drizzle',
                55: 'Dense drizzle',
                56: 'Freezing drizzle',
                57: 'Dense freezing drizzle',
                61: 'Slight rain',
                63: 'Moderate rain',
                65: 'Heavy rain',
                66: 'Freezing rain',
                67: 'Heavy freezing rain',
                71: 'Slight snow',
                73: 'Moderate snow',
                75: 'Heavy snow',
                77: 'Snow grains',
                80: 'Slight rain showers',
                81: 'Moderate rain showers',
                82: 'Violent rain showers',
                85: 'Slight snow showers',
                86: 'Heavy snow showers',
                95: 'Thunderstorm',
                96: 'Thunderstorm with slight hail',
                99: 'Thunderstorm with heavy hail'
            };
            return WEATHER_CODES[code] || 'Unknown';
        }

        async function fetchOpenMeteo(lat, lon, unit) {
            const temperatureUnit = unit === 'imperial' ? 'fahrenheit' : 'celsius';
            const response = await fetch(
                `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&temperature_unit=${temperatureUnit}`
            );
            if (!response.ok) throw new Error('Open-Meteo fetch failed');
            return response.json();
        }

        async function fetchWeather() {
            const weatherToggle = document.getElementById('toggle-weather').checked;
            const weatherBox = document.getElementById('weather');

            if (!weatherToggle) {
                weatherBox.style.display = 'none';
                return;
            }
            weatherBox.style.display = 'block';

            const key = document.getElementById('weather-key').value.trim();
            const unit = document.getElementById('weather-unit').value;
            const unitSymbol = unit === 'metric' ? '°C' : '°F';

            if (!key) {
                weatherBox.innerText = '위치 버튼을 눌러 Open-Meteo로 현재 위치 날씨를 확인하세요.';
                return;
            }

            const city = citySelect.value.trim() || 'Seoul';
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${key}&units=${unit}`);
                if (!res.ok) throw new Error();
                const data = await res.json();
                weatherBox.innerText = `${data.name} : ${Math.round(data.main.temp)}${unitSymbol} / ${data.weather[0].main}`;
            } catch {
                weatherBox.innerText = '날씨 연동 실패 (도시명 또는 API Key 오류)';
            }
        }

        document.getElementById('toggle-weather').addEventListener('change', fetchWeather);
        document.getElementById('weather-unit').addEventListener('change', fetchWeather);
        document.getElementById('weather-key').addEventListener('change', fetchWeather);
        citySelect.addEventListener('change', fetchWeather);

        const mainScreen = document.getElementById('main-screen');
        const menuBtn = document.getElementById('menu-btn');
        const settingsPanel = document.getElementById('settings-panel');

        mainScreen.addEventListener('click', () => {
            menuBtn.classList.toggle('show');
            if (!menuBtn.classList.contains('show')) {
                settingsPanel.classList.remove('show');
            }
            resetFadeTimer();
        });

        window.addEventListener('mousemove', resetFadeTimer);
        window.addEventListener('touchstart', resetFadeTimer);

        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsPanel.classList.toggle('show');
            clearTimeout(fadeTimer);
        });

        settingsPanel.addEventListener('click', (e) => e.stopPropagation());

        document.getElementById('video-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const bgVideo = document.getElementById('bg-video');
            const nameEl = document.getElementById('video-filename');

            bgVideo.pause();
            if (bgVideo._onCanPlay) {
                bgVideo.removeEventListener('canplay', bgVideo._onCanPlay);
                bgVideo._onCanPlay = null;
            }
            if (bgVideo._onError) {
                bgVideo.removeEventListener('error', bgVideo._onError);
                bgVideo._onError = null;
            }

            if (bgVideo._blobURL) {
                URL.revokeObjectURL(bgVideo._blobURL);
                bgVideo._blobURL = null;
            }

            bgVideo.removeAttribute('src');
            Array.from(bgVideo.querySelectorAll('source')).forEach(source => source.remove());
            bgVideo.load();

            const blobURL = URL.createObjectURL(file);
            bgVideo._blobURL = blobURL;

            nameEl.innerText = `📁 ${file.name}`;

            bgVideo._onCanPlay = function onCanPlay() {
                bgVideo.removeEventListener('canplay', bgVideo._onCanPlay);
                bgVideo._onCanPlay = null;
                bgVideo.play().catch(() => {
                    nameEl.innerText = '▶ 화면을 클릭하면 재생됩니다.';
                });
            };

            bgVideo._onError = function onError() {
                bgVideo.removeEventListener('error', bgVideo._onError);
                bgVideo._onError = null;
                nameEl.innerText = '⚠️ 이 동영상 형식은 재생할 수 없습니다.';
            };

            bgVideo.addEventListener('canplay', bgVideo._onCanPlay);
            bgVideo.addEventListener('error', bgVideo._onError);
            bgVideo.src = blobURL;
            bgVideo.load();
            bgVideo.play().catch(() => {
                nameEl.innerText = '▶ 화면을 클릭하면 재생됩니다.';
            });
        });

        document.getElementById('geo-btn').addEventListener('click', function() {
            const statusEl = document.getElementById('geo-status');

            if (!navigator.geolocation) {
                statusEl.innerText = '이 브라우저는 위치 탐색을 지원하지 않습니다.';
                return;
            }

            statusEl.innerText = '📡 위치 탐색 중...';

            navigator.geolocation.getCurrentPosition(
                async function(pos) {
                    const { latitude: lat, longitude: lon } = pos.coords;
                    const unit = document.getElementById('weather-unit').value;
                    const unitSymbol = unit === 'metric' ? '°C' : '°F';
                    const weatherBox = document.getElementById('weather');

                    try {
                        const data = await fetchOpenMeteo(lat, lon, unit);
                        const description = mapWeatherCode(data.current_weather.weathercode);

                        statusEl.innerText = '✅ 현재 위치 감지됨';
                        setTimeout(() => { statusEl.innerText = ''; }, 3000);

                        if (document.getElementById('toggle-weather').checked) {
                            weatherBox.style.display = 'block';
                            weatherBox.innerText = `${Math.round(data.current_weather.temperature)}${unitSymbol} / ${description} (Open-Meteo)`;
                        }
                    } catch {
                        statusEl.innerText = 'Open-Meteo 조회 실패';
                    }
                },
                function(err) {
                    const msgs = {
                        1: '위치 권한이 거부되었습니다.',
                        2: '위치를 확인할 수 없습니다.',
                        3: '위치 탐색 시간이 초과되었습니다.'
                    };
                    statusEl.innerText = msgs[err.code] || '위치 탐색 실패';
                },
                { timeout: 10000, maximumAge: 60000 }
            );
        });

        document.getElementById('toggle-greenscreen').addEventListener('change', function(e) {
            document.getElementById('greenscreen').style.display = e.target.checked ? 'block' : 'none';
        });

        document.getElementById('toggle-lightmode').addEventListener('change', function(e) {
            document.body.classList.toggle('light-mode', e.target.checked);
        });

        document.getElementById('font-select').addEventListener('change', function(e) {
            document.body.style.fontFamily = e.target.value;
        });

        document.getElementById('color-picker').addEventListener('input', function(e) {
            document.getElementById('main-screen').style.color = e.target.value;
        });
    </script>
