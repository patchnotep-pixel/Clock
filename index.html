<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>감성 커스텀 시계</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&family=Nanum+Gothic:wght@400;700&family=Noto+Serif+KR:wght@300;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            color: #fff;
            user-select: none;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        body.light-mode {
            background-color: #f5f5f5;
            color: #222;
        }

        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .greenscreen-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #00ff00;
            z-index: -1;
            display: none;
        }

        .clock-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
            cursor: pointer;
            transition: background 0.5s ease, text-shadow 0.5s ease;
        }

        body.light-mode .clock-container {
            background: rgba(255, 255, 255, 0.4);
            text-shadow: 0 4px 20px rgba(255, 255, 255, 0.8);
        }

        .time-box {
            display: flex;
            align-items: baseline;
        }

        #ampm {
            font-size: 2.5rem;
            margin-right: 15px;
            font-weight: 400;
            display: none;
        }

        #time {
            font-size: 8rem;
            font-weight: 200;
            letter-spacing: -2px;
            line-height: 1;
        }

        #date {
            font-size: 1.5rem;
            font-weight: 400;
            margin-top: 15px;
            letter-spacing: 4px;
            opacity: 0.8;
        }

        #weather {
            font-size: 1.2rem;
            font-weight: 400;
            margin-top: 15px;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .settings-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: inherit;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        body.light-mode .settings-btn {
            background: rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.2);
        }

        .settings-btn.show {
            opacity: 1;
            visibility: visible;
        }

        .settings-modal {
            position: fixed;
            bottom: 90px;
            right: 30px;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 15px;
            width: 360px;
            max-height: 70vh;
            overflow-y: auto;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            color: #fff;
        }

        body.light-mode .settings-modal {
            background: rgba(245, 245, 245, 0.95);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #222;
        }

        .setting-section {
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        body.light-mode .setting-section {
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .setting-section h4 {
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: #ddd;
            font-weight: 700;
        }

        body.light-mode .setting-section h4 {
            color: #333;
        }

        .flex-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 6px;
        }

        label {
            font-size: 0.85rem;
            color: #bbb;
        }

        body.light-mode label {
            color: #555;
        }

        input[type="text"], select, input[type="file"] {
            width: 100%;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: inherit;
            font-family: inherit;
            outline: none;
            font-size: 0.85rem;
        }

        body.light-mode input[type="text"], body.light-mode select {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.2);
            color: #000;
        }

        body.light-mode select option {
            color: #000;
        }

        input[type="file"] {
            display: none;
        }

        .file-label {
            display: block;
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            border: 1px dashed rgba(255, 255, 255, 0.4);
            color: #fff;
        }

        body.light-mode .file-label {
            background: rgba(0, 0, 0, 0.05);
            border: 1px dashed rgba(0, 0, 0, 0.3);
            color: #333;
        }

        .file-label:hover { background: rgba(255, 255, 255, 0.25); }
        body.light-mode .file-label:hover { background: rgba(0, 0, 0, 0.1); }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #444; transition: .3s; border-radius: 22px;
        }

        body.light-mode .slider {
            background-color: #ccc;
        }

        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s; border-radius: 50%;
        }

        input:checked + .slider { background-color: #fff; }
        body.light-mode input:checked + .slider { background-color: #222; }
        
        input:checked + .slider:before { transform: translateX(18px); background-color: #000; }
        body.light-mode input:checked + .slider:before { background-color: #fff; }

        .location-selectors {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }

        .location-selectors select {
            width: 33.3%;
            padding: 6px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="video-background">
        <video id="bg-video" autoplay loop muted playsinline></video>
    </div>

    <div class="greenscreen-bg" id="greenscreen"></div>

    <div class="clock-container" id="main-screen">
        <div class="time-box">
            <span id="ampm">AM</span>
            <span id="time">00:00:00</span>
        </div>
        <div id="date">LOADING...</div>
        <div id="weather">날씨 기능을 켜거나 지역을 설정해 줘</div>
    </div>

    <button class="settings-btn" id="menu-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>

    <div class="settings-modal" id="settings-panel">
        <div class="setting-section">
            <h4>테마 및 배경</h4>
            <div class="flex-row">
                <label>라이트 모드 켜기</label>
                <label class="switch"><input type="checkbox" id="toggle-theme"><span class="slider"></span></label>
            </div>
            <div style="margin-top: 10px; margin-bottom: 8px;">
                <label class="file-label" for="video-file">내 컴퓨터 비디오 선택</label>
                <input type="file" id="video-file" accept="video/mp4,video/x-m4v,video/*">
            </div>
            <div class="flex-row">
                <label>크로마키 그린스크린</label>
                <label class="switch"><input type="checkbox" id="toggle-greenscreen"><span class="slider"></span></label>
            </div>
        </div>

        <div class="setting-section">
            <h4>시계 및 날짜</h4>
            <div class="flex-row">
                <label>오전/오후 (AM/PM)</label>
                <label class="switch"><input type="checkbox" id="toggle-ampm"><span class="slider"></span></label>
            </div>
            <div class="flex-row" style="margin-top: 5px;">
                <label>표시 단위:</label>
                <div style="display: flex; gap: 8px;">
                    <label><input type="checkbox" id="show-hour" checked> 시</label>
                    <label><input type="checkbox" id="show-min" checked> 분</label>
                    <label><input type="checkbox" id="show-sec" checked> 초</label>
                </div>
            </div>
            <div class="flex-row" style="margin-top: 10px;">
                <label>날짜 표시</label>
                <label class="switch"><input type="checkbox" id="toggle-date" checked><span class="slider"></span></label>
            </div>
            <div class="flex-row" id="date-sub-options" style="margin-top: 5px;">
                <label><input type="checkbox" id="show-year" checked> 년</label>
                <label><input type="checkbox" id="show-month" checked> 월</label>
                <label><input type="checkbox" id="show-day" checked> 일</label>
            </div>
        </div>

        <div class="setting-section">
            <h4>날씨 설정 (OpenWeather)</h4>
            <div class="flex-row">
                <label>날씨 켜기</label>
                <label class="switch"><input type="checkbox" id="toggle-weather"><span class="slider"></span></label>
            </div>
            <div style="margin-top: 8px;">
                <label>지역 선택</label>
                <div class="location-selectors">
                    <select id="sido-select"><option value="">도/시</option></select>
                    <select id="sigungu-select"><option value="">구/시</option></select>
                    <select id="dong-select"><option value="">동</option></select>
                </div>
            </div>
            <div class="flex-row" style="margin-top: 8px;">
                <label>온도 단위</label>
                <select id="weather-unit" style="width: 60%; padding: 4px;">
                    <option value="metric">섭씨 (°C)</option>
                    <option value="imperial">화씨 (°F)</option>
                </select>
            </div>
            <div class="flex-row" style="margin-top: 8px;">
                <label>API Key</label>
                <input type="text" id="weather-key" placeholder="개인 키 입력" style="width: 60%; padding: 4px 8px;">
            </div>
        </div>

        <div class="setting-section" style="border: none; margin-bottom: 0;">
            <h4>스타일</h4>
            <div class="flex-row">
                <label>폰트</label>
                <select id="font-select" style="width: 70%;">
                    <option value="'Montserrat', sans-serif">Montserrat</option>
                    <option value="'Orbitron', sans-serif">Orbitron</option>
                    <option value="'Noto Serif KR', serif">Noto Serif KR</option>
                    <option value="'Nanum Gothic', sans-serif">Nanum Gothic</option>
                </select>
            </div>
            <div class="flex-row" style="margin-top: 8px;">
                <label>글자 색상</label>
                <input type="color" id="color-picker" value="#ffffff" style="border:none; background:none; cursor:pointer; width:40px; height:25px;">
            </div>
        </div>
    </div>

    <script>
        const locationData = {
            "서울특별시": {
                "강남구": ["역삼동", "논현동", "삼성동"],
                "서초구": ["서초동", "반포동", "방배동"],
                "종로구": ["종로1가", "삼청동", "혜화동"]
            },
            "경기도": {
                "수원시": ["영통동", "매탄동", "광교동", "권선동"],
                "성남시": ["분당동", "판교동", "정자동"],
                "용인시": ["수지구", "기흥구", "처인구"]
            },
            "부산광역시": {
                "해운대구": ["우동", "좌동", "반여동"],
                "수영구": ["남천동", "광안동", "민락동"]
            }
        };

        const weatherCityMap = {
            "서울특별시": "Seoul",
            "경기도": {
                "수원시": "Suwon",
                "성남시": "Seongnam",
                "용인시": "Yongin"
            },
            "부산광역시": "Busan"
        };

        const sidoSelect = document.getElementById('sido-select');
        const sigunguSelect = document.getElementById('sigungu-select');
        const dongSelect = document.getElementById('dong-select');

        for (const sido in locationData) {
            const option = document.createElement('option');
            option.value = sido;
            option.textContent = sido;
            sidoSelect.appendChild(option);
        }

        sidoSelect.addEventListener('change', function() {
            sigunguSelect.innerHTML = '<option value="">구/시</option>';
            dongSelect.innerHTML = '<option value="">동</option>';
            const selectedSido = this.value;
            if (locationData[selectedSido]) {
                for (const sigungu in locationData[selectedSido]) {
                    const option = document.createElement('option');
                    option.value = sigungu;
                    option.textContent = sigungu;
                    sigunguSelect.appendChild(option);
                }
            }
            fetchWeather();
        });

        sigunguSelect.addEventListener('change', function() {
            dongSelect.innerHTML = '<option value="">동</option>';
            const selectedSido = sidoSelect.value;
            const selectedSigungu = this.value;
            if (locationData[selectedSido] && locationData[selectedSido][selectedSigungu]) {
                locationData[selectedSido][selectedSigungu].forEach(dong => {
                    const option = document.createElement('option');
                    option.value = dong;
                    option.textContent = dong;
                    dongSelect.appendChild(option);
                });
            }
            fetchWeather();
        });

        dongSelect.addEventListener('change', fetchWeather);

        let fadeTimer;
        function resetFadeTimer() {
            if (document.getElementById('settings-panel').classList.contains('show')) {
                clearTimeout(fadeTimer);
                return;
            }
            clearTimeout(fadeTimer);
            fadeTimer = setTimeout(() => {
                document.getElementById('menu-btn').classList.remove('show');
            }, 5000);
        }

        function updateClock() {
            const now = new Date();
            const hCheck = document.getElementById('show-hour').checked;
            const mCheck = document.getElementById('show-min').checked;
            const sCheck = document.getElementById('show-sec').checked;
            const ampmCheck = document.getElementById('toggle-ampm').checked;

            let rawHours = now.getHours();
            
            if (ampmCheck) {
                document.getElementById('ampm').style.display = "inline";
                document.getElementById('ampm').innerText = rawHours >= 12 ? "PM" : "AM";
                rawHours = rawHours % 12;
                rawHours = rawHours ? rawHours : 12;
            } else {
                document.getElementById('ampm').style.display = "none";
            }

            const hours = String(rawHours).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            let timeArray = [];
            if (hCheck) timeArray.push(hours);
            if (mCheck) timeArray.push(minutes);
            if (sCheck) timeArray.push(seconds);
            document.getElementById('time').innerText = timeArray.join(':') || "00";

            const dateVisible = document.getElementById('toggle-date').checked;
            const dateBox = document.getElementById('date');
            
            if (dateVisible) {
                dateBox.style.display = "block";
                const yCheck = document.getElementById('show-year').checked;
                const moCheck = document.getElementById('show-month').checked;
                const dCheck = document.getElementById('show-day').checked;
                
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const date = String(now.getDate()).padStart(2, '0');
                const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
                const dayStr = days[now.getDay()];

                let dateArray = [];
                if (yCheck) dateArray.push(year);
                if (moCheck) dateArray.push(month);
                if (dCheck) dateArray.push(date);
                
                let resultDateStr = dateArray.join(' . ');
                if (resultDateStr) resultDateStr += ` . ${dayStr}`;
                dateBox.innerText = resultDateStr || dayStr;
            } else {
                dateBox.style.display = "none";
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchWeather() {
            const weatherToggle = document.getElementById('toggle-weather').checked;
            const weatherBox = document.getElementById('weather');
            
            if (!weatherToggle) {
                weatherBox.style.display = "none";
                return;
            }
            weatherBox.style.display = "block";

            const sido = sidoSelect.value;
            const sigungu = sigunguSelect.value;
            let queryCity = "Seoul"; 

            if (sido) {
                if (typeof weatherCityMap[sido] === 'string') {
                    queryCity = weatherCityMap[sido];
                } else if (typeof weatherCityMap[sido] === 'object' && sigungu) {
                    queryCity = weatherCityMap[sido][sigungu] || "Seoul";
                }
            }

            const unit = document.getElementById('weather-unit').value;
            const key = document.getElementById('weather-key').value.trim();
            const unitSymbol = unit === 'metric' ? '°C' : '°F';

            if(!key) {
                weatherBox.innerText = "설정에서 API Key를 입력해 줘";
                return;
            }

            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${queryCity}&appid=${key}&units=${unit}`);
                if (!res.ok) throw new Error();
                const data = await res.json();
                const temp = Math.round(data.main.temp);
                let displayLocation = dongSelect.value || sigungu || sido || data.name;
                weatherBox.innerText = `${displayLocation} : ${temp}${unitSymbol} / ${data.weather[0].main}`;
            } catch (err) {
                weatherBox.innerText = "날씨 연동 실패";
            }
        }
        document.getElementById('toggle-weather').addEventListener('change', fetchWeather);
        document.getElementById('weather-unit').addEventListener('change', fetchWeather);
        document.getElementById('weather-key').addEventListener('change', fetchWeather);

        const mainScreen = document.getElementById('main-screen');
        const menuBtn = document.getElementById('menu-btn');
        const settingsPanel = document.getElementById('settings-panel');

        mainScreen.addEventListener('click', () => {
            menuBtn.classList.toggle('show');
            if (!menuBtn.classList.contains('show')) {
                settingsPanel.classList.remove('show');
            }
            resetFadeTimer();
        });

        window.addEventListener('mousemove', resetFadeTimer);
        window.addEventListener('touchstart', resetFadeTimer);

        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsPanel.classList.toggle('show');
            clearTimeout(fadeTimer);
        });

        settingsPanel.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        document.getElementById('video-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const bgVideo = document.getElementById('bg-video');
            
            if(bgVideo.src) {
                URL.revokeObjectURL(bgVideo.src);
                bgVideo.removeAttribute('src');
                bgVideo.load();
            }

            try {
                const fileURL = URL.createObjectURL(file);
                bgVideo.src = fileURL;
                
                bgVideo.onloadeddata = () => {
                    bgVideo.play().catch(err => {
                        console.error(err);
                    });
                };
            } catch (error) {
                console.error(error);
            }
        });

        document.getElementById('toggle-theme').addEventListener('change', function(e) {
            if (e.target.checked) {
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.remove('light-mode');
            }
        });

        document.getElementById('toggle-greenscreen').addEventListener('change', function(e) {
            document.getElementById('greenscreen').style.display = e.target.checked ? 'block' : 'none';
        });

        document.getElementById('font-select').addEventListener('change', function(e) {
            document.body.style.fontFamily = e.target.value;
        });

        document.getElementById('color-picker').addEventListener('input', function(e) {
            document.getElementById('main-screen').style.color = e.target.value;
        });
    </script>
</body>
</html>
